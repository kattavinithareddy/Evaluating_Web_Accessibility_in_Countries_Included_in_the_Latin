{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Accessibility Platform{% endblock %}

{% block content %}
<div class="container" style="margin-top: 80px;">
    <div class="card" style="max-width: 450px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="margin-bottom: 10px;">Welcome Back</h2>
            <p style="color: var(--text-light);">Sign in to continue</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    id="username" 
                    class="form-control" 
                    placeholder="Enter your username"
                    required
                    autofocus
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password" 
                    class="form-control" 
                    placeholder="Enter your password"
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
            
            <p style="text-align: center; margin-top: 20px; color: var(--text-light);">
                Don't have an account? <a href="{% url 'user_management:register' %}" style="color: var(--secondary-color); font-weight: 600;">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
